services:
  db:
    image: postgres
    ports:
      - 5432:5432
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_DATABASE:-miti}
    volumes:
      - ./mnt/postgres:/var/lib/postgresql/data
  api:
    build: .
    restart: always
    ports:
      - 2727:2727
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - DB_PASSWORD=${DB_PASSWORD}
    profiles:
      - api
